<svg width="100%" height="180" viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1228"/>
      <stop offset="100%" stop-color="#0F2027"/>
    </linearGradient>
    <radialGradient id="dhalo" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0A1228" stop-opacity="0"/>
    </radialGradient>
    <style>
      .dl { font: 700 16px ui-monospace, monospace; fill: #22D3EE; letter-spacing: 0.3em; }
      .dm { font: 400 10px ui-monospace, monospace; fill: #94A3B8; letter-spacing: 0.2em; }
      .ds { font: 600 9px ui-monospace, monospace; fill: #cbd5e1; }
    </style>
  </defs>
  <rect width="600" height="180" rx="10" fill="url(#dbg)"/>
  <circle cx="300" cy="100" r="140" fill="url(#dhalo)"/>

  <!-- CI/CD Pipeline -->
  <g transform="translate(60,90)">
    <!-- stages -->
    <rect x="0" y="-12" width="60" height="24" rx="3" fill="none" stroke="#22D3EE" stroke-width="1.2"/>
    <text x="30" y="3" class="ds" text-anchor="middle" fill="#22D3EE">COMMIT</text>

    <rect x="80" y="-12" width="60" height="24" rx="3" fill="none" stroke="#22D3EE" stroke-width="1.2"/>
    <text x="110" y="3" class="ds" text-anchor="middle" fill="#22D3EE">BUILD</text>

    <rect x="160" y="-12" width="60" height="24" rx="3" fill="none" stroke="#7C3AED" stroke-width="1.2"/>
    <text x="190" y="3" class="ds" text-anchor="middle" fill="#A78BFA">TEST</text>

    <rect x="240" y="-12" width="60" height="24" rx="3" fill="none" stroke="#A78BFA" stroke-width="1.2"/>
    <text x="270" y="3" class="ds" text-anchor="middle" fill="#A78BFA">SHIP</text>

    <!-- connecting lines -->
    <line x1="60" y1="0" x2="80" y2="0" stroke="#22D3EE" stroke-width="1"/>
    <line x1="140" y1="0" x2="160" y2="0" stroke="#22D3EE" stroke-width="1"/>
    <line x1="220" y1="0" x2="240" y2="0" stroke="#A78BFA" stroke-width="1"/>

    <!-- traveling pulse through pipeline -->
    <circle r="3" fill="#22D3EE">
      <animate attributeName="cx" values="0;300" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="0;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#A78BFA">
      <animate attributeName="cx" values="0;300" dur="4s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="0;0" dur="4s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Rotating gears -->
  <g transform="translate(440,95)">
    <!-- big gear -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
      <g fill="none" stroke="#22D3EE" stroke-width="1.5">
        <circle r="20"/>
        <circle r="6"/>
        <line x1="0" y1="-26" x2="0" y2="-20"/>
        <line x1="0" y1="20" x2="0" y2="26"/>
        <line x1="-26" y1="0" x2="-20" y2="0"/>
        <line x1="20" y1="0" x2="26" y2="0"/>
        <line x1="-18" y1="-18" x2="-14" y2="-14"/>
        <line x1="14" y1="-14" x2="18" y2="-18"/>
        <line x1="-18" y1="18" x2="-14" y2="14"/>
        <line x1="14" y1="14" x2="18" y2="18"/>
      </g>
    </g>
    <!-- small gear -->
    <g transform="translate(36,-20)">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" additive="sum" repeatCount="indefinite"/>
      <g fill="none" stroke="#A78BFA" stroke-width="1.2">
        <circle r="12"/>
        <circle r="4"/>
        <line x1="0" y1="-16" x2="0" y2="-12"/>
        <line x1="0" y1="12" x2="0" y2="16"/>
        <line x1="-16" y1="0" x2="-12" y2="0"/>
        <line x1="12" y1="0" x2="16" y2="0"/>
        <line x1="-11" y1="-11" x2="-8" y2="-8"/>
        <line x1="8" y1="-8" x2="11" y2="-11"/>
      </g>
    </g>
  </g>

  <!-- Container icons floating -->
  <g transform="translate(380,140)" opacity="0.6">
    <rect x="-20" y="-8" width="16" height="16" rx="1" fill="none" stroke="#2496ED" stroke-width="1">
      <animate attributeName="y" values="-8;-12;-8" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="-8" width="16" height="16" rx="1" fill="none" stroke="#2496ED" stroke-width="1">
      <animate attributeName="y" values="-8;-12;-8" dur="2s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="20" y="-8" width="16" height="16" rx="1" fill="none" stroke="#2496ED" stroke-width="1">
      <animate attributeName="y" values="-8;-12;-8" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="300" y="40" class="dl" text-anchor="middle">DEVOPS &amp; INFRASTRUCTURE</text>
  <text x="300" y="160" class="dm" text-anchor="middle">DOCKER · K8S · CI/CD · CLOUD</text>
</svg>
