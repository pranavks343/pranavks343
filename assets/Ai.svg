<svg width="100%" height="180" viewBox="0 0 600 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03050C"/>
      <stop offset="100%" stop-color="#1C3C3C"/>
    </linearGradient>
    <radialGradient id="ahalo" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#03050C" stop-opacity="0"/>
    </radialGradient>
    <style>
      .al { font: 700 16px ui-monospace, monospace; fill: #22D3EE; letter-spacing: 0.3em; }
      .am { font: 400 10px ui-monospace, monospace; fill: #94A3B8; letter-spacing: 0.2em; }
    </style>
  </defs>
  <rect width="600" height="180" rx="10" fill="url(#abg)"/>
  <circle cx="300" cy="90" r="140" fill="url(#ahalo)"/>

  <!-- Neural network -->
  <g transform="translate(150,90)">
    <!-- connections layer 1 -> 2 -->
    <g stroke="#22D3EE" stroke-width="0.6" opacity="0.4">
      <line x1="0" y1="-40" x2="80" y2="-50"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></line>
      <line x1="0" y1="-40" x2="80" y2="-15"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" repeatCount="indefinite"/></line>
      <line x1="0" y1="-40" x2="80" y2="20"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></line>
      <line x1="0" y1="-40" x2="80" y2="50"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></line>
      <line x1="0" y1="0" x2="80" y2="-50"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.1s" repeatCount="indefinite"/></line>
      <line x1="0" y1="0" x2="80" y2="-15"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></line>
      <line x1="0" y1="0" x2="80" y2="20"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" repeatCount="indefinite"/></line>
      <line x1="0" y1="0" x2="80" y2="50"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></line>
      <line x1="0" y1="40" x2="80" y2="-50"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.2s" repeatCount="indefinite"/></line>
      <line x1="0" y1="40" x2="80" y2="-15"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite"/></line>
      <line x1="0" y1="40" x2="80" y2="20"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></line>
      <line x1="0" y1="40" x2="80" y2="50"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></line>
    </g>
    <!-- connections layer 2 -> 3 -->
    <g stroke="#A78BFA" stroke-width="0.6" opacity="0.4">
      <line x1="80" y1="-50" x2="160" y2="-25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" repeatCount="indefinite"/></line>
      <line x1="80" y1="-50" x2="160" y2="25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></line>
      <line x1="80" y1="-15" x2="160" y2="-25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/></line>
      <line x1="80" y1="-15" x2="160" y2="25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" repeatCount="indefinite"/></line>
      <line x1="80" y1="20" x2="160" y2="-25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite"/></line>
      <line x1="80" y1="20" x2="160" y2="25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></line>
      <line x1="80" y1="50" x2="160" y2="-25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/></line>
      <line x1="80" y1="50" x2="160" y2="25"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.9s" repeatCount="indefinite"/></line>
    </g>
    <!-- nodes -->
    <g>
      <circle cx="0" cy="-40" r="6" fill="#22D3EE"><animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/></circle>
      <circle cx="0" cy="0" r="6" fill="#22D3EE"><animate attributeName="r" values="5;7;5" dur="2.3s" repeatCount="indefinite"/></circle>
      <circle cx="0" cy="40" r="6" fill="#22D3EE"><animate attributeName="r" values="5;7;5" dur="2.6s" repeatCount="indefinite"/></circle>
      <circle cx="80" cy="-50" r="6" fill="#7C3AED"><animate attributeName="r" values="5;7;5" dur="2.1s" repeatCount="indefinite"/></circle>
      <circle cx="80" cy="-15" r="6" fill="#7C3AED"><animate attributeName="r" values="5;7;5" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="80" cy="20" r="6" fill="#7C3AED"><animate attributeName="r" values="5;7;5" dur="2.7s" repeatCount="indefinite"/></circle>
      <circle cx="80" cy="50" r="6" fill="#7C3AED"><animate attributeName="r" values="5;7;5" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="160" cy="-25" r="6" fill="#A78BFA"><animate attributeName="r" values="5;7;5" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="160" cy="25" r="6" fill="#A78BFA"><animate attributeName="r" values="5;7;5" dur="2.5s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- Agent graph (LangGraph style) on right -->
  <g transform="translate(450,90)">
    <rect x="-40" y="-50" width="80" height="22" rx="4" fill="none" stroke="#22D3EE" stroke-width="1.5"/>
    <text x="0" y="-35" class="am" text-anchor="middle" fill="#22D3EE">PLAN</text>
    <rect x="-40" y="-15" width="80" height="22" rx="4" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
    <text x="0" y="0" class="am" text-anchor="middle" fill="#A78BFA">TOOL</text>
    <rect x="-40" y="20" width="80" height="22" rx="4" fill="none" stroke="#A78BFA" stroke-width="1.5"/>
    <text x="0" y="35" class="am" text-anchor="middle" fill="#A78BFA">EXEC</text>
    <line x1="0" y1="-28" x2="0" y2="-15" stroke="#22D3EE" stroke-width="1" stroke-dasharray="2,2">
      <animate attributeName="stroke-dashoffset" values="0;-8" dur="0.8s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="7" x2="0" y2="20" stroke="#A78BFA" stroke-width="1" stroke-dasharray="2,2">
      <animate attributeName="stroke-dashoffset" values="0;-8" dur="0.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="300" y="40" class="al" text-anchor="middle">AI &amp; GENERATIVE SYSTEMS</text>
  <text x="300" y="155" class="am" text-anchor="middle">LANGGRAPH · MCP · AGENTS · RAG</text>
</svg>
